<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Leaderboard</title>
    <style>
        /* CSS Crítico primeiro para carregar o visual na hora */
        body {
            background-color: #0d1117; /* Cor de fundo enquanto a imagem não carrega */
            background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #e9e3e3;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .ranking-container {
            width: 95%;
            max-width: 600px;
            margin-top: 20px;
            min-height: 800px; /* Reserva o espaço para não "pular" a página */
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <h1>SAMUELSPORTS</h1>

    <div class="ranking-container" id="iframe-slot">
        <!-- O iframe será injetado pelo script abaixo -->
    </div>

    <script>
        // 1. CARREGAMENTO DO IFRAME (Sempre atualizado)
        // Isso garante que o HTML e a Imagem carreguem ANTES do iframe começar a puxar dados
        window.onload = () => {
            const container = document.getElementById('iframe-slot');
            const iframe = document.createElement('iframe');
            iframe.src = "https://script.google.com/macros/s/AKfycbzET26SuTUFltwRutjLbRT49ZhE4qFsyXwa_iLiWrPRsXaPk8Z1h1ioKSRRhI84MoB4ng/exec";
            iframe.setAttribute('allowtransparency', 'true');
            container.appendChild(iframe);
        };

        // 2. REGISTRO DE CACHE (Para a página abrir instantaneamente na próxima vez)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
