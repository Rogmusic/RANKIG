<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Leaderboard</title>
    <!-- Bootstrap 5 -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 40px 0; }
        .ranking-card { max-width: 600px; margin: auto; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .table thead { background-color: #212529; color: white; }
        .table thead th { border: none; padding: 15px; }
        .table td { vertical-align: middle; padding: 12px 15px; }
        
        /* Cores de destaque para o Top 3 */
        .rank-1 { background-color: #fff9c4 !important; font-weight: bold; } /* Ouro */
        .rank-2 { background-color: #f5f5f5 !important; } /* Prata */
        .rank-3 { background-color: #efebe9 !important; } /* Bronze */
        
        .badge-rank { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; background: #dee2e6; font-weight: bold; font-size: 0.9em; }
        .rank-1 .badge-rank { background: #ffc107; color: #000; }
        .rank-2 .badge-rank { background: #adb5bd; color: #fff; }
        .rank-3 .badge-rank { background: #a1887f; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="card ranking-card">
        <div class="card-body p-0 overflow-hidden" style="border-radius: 15px;">
            <div class="bg-primary text-white text-center py-4">
                <h2 class="mb-0">🏆 Ranking Oficial</h2>
                <small>Atualizado em tempo real</small>
            </div>
            
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th width="80" class="text-center">#</th>
                        <th>Nome</th>
                        <th class="text-end">Pontos</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr>
                        <td colspan="3" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status"></div>
                            <br><small>Carregando dados...</small>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // SEU LINK ATUALIZADO
    const URL_CSV = 'https://google.com';
    
    // Proxy para evitar erro de CORS
    const PROXY = 'https://allorigins.win';

    async function buscarDados() {
        try {
            const response = await fetch(PROXY + encodeURIComponent(URL_CSV));
            const data = await response.text();
            
            // Divide as linhas e remove a primeira (cabeçalho)
            const linhas = data.split(/\r?\n/).slice(1);
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';

            linhas.forEach((linha) => {
                // Tenta dividir por vírgula ou ponto e vírgula
                const colunas = linha.includes(';') ? linha.split(';') : linha.split(',');
                
                if (colunas.length >= 3) {
                    const pos = colunas[0].trim();
                    const nome = colunas[1].trim();
                    const pontos = colunas[2].trim();
                    
                    // Define classe de destaque
                    let classeRank = '';
                    if (pos == '1') classeRank = 'rank-1';
                    else if (pos == '2') classeRank = 'rank-2';
                    else if (pos == '3') classeRank = 'rank-3';

                    corpo.innerHTML += `
                        <tr class="${classeRank}">
                            <td class="text-center"><span class="badge-rank">${pos}</span></td>
                            <td>${nome}</td>
                            <td class="text-end fw-bold text-primary">${pontos}</td>
                        </tr>
                    `;
                }
            });

        } catch (error) {
            console.error(error);
            document.getElementById('tabela-corpo').innerHTML = '<tr><td colspan="3" class="text-center text-danger">Erro ao carregar os dados. Verifique a publicação da planilha.</td></tr>';
        }
    }

    // Inicia a busca
    buscarDados();
</script>

</body>
</html>
