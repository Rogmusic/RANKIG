<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Leaderboard</title>
   <style>
    body {
        /* Cor de fundo sólida para carregar INSTANTANEAMENTE antes da imagem */
        background-color: #0b0e14; 
        
        /* Configuração padrão da imagem */
        background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: sans-serif;
    }

    /* AJUSTE ESPECÍFICO PARA MOBILE (Celulares) */
    @media (max-width: 768px) {
        body {
            /* No celular, centralizamos a ação do estádio */
            background-position: 65% center; 
            /* Evita que o fundo "pule" quando a barra do navegador sobe/desce */
            background-attachment: scroll; 
        }
        
        h1 {
            font-size: 1.8rem;
            margin-top: 15px;
        }

        .ranking-container {
            width: 98%; /* Ganha mais espaço nas laterais no celular */
            margin-top: 10px;
        }
        
        iframe {
            height: 90vh; /* O iframe ocupa quase a tela toda no celular */
        }
    }

    h1 {
        color: #e9e3e3;
        font-weight: bold;
        margin-top: 20px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        text-align: center;
    }

    .ranking-container {
        width: 95%;
        max-width: 600px;
        margin-top: 20px;
        /* Background semi-transparente para o ranking não sumir no fundo */
        background: rgba(0, 0, 0, 0.4); 
        border-radius: 10px;
        overflow: hidden;
    }

    iframe {
        width: 100%;
        height: 800px;
        border: none;
        background: transparent;
        display: block;
    }
</style>
 
    
</head>
<body>

    <h1>SAMUELSPORTS</h1>

    <div class="ranking-container" id="iframe-slot">
        <!-- O iframe será injetado pelo script abaixo -->
    </div>

    <script>
        // 1. CARREGAMENTO DO IFRAME (Sempre atualizado)
        // Isso garante que o HTML e a Imagem carreguem ANTES do iframe começar a puxar dados
        window.onload = () => {
            const container = document.getElementById('iframe-slot');
            const iframe = document.createElement('iframe');
            iframe.src = "https://script.google.com/macros/s/AKfycbzET26SuTUFltwRutjLbRT49ZhE4qFsyXwa_iLiWrPRsXaPk8Z1h1ioKSRRhI84MoB4ng/exec";
            iframe.setAttribute('allowtransparency', 'true');
            container.appendChild(iframe);
        };

        // 2. REGISTRO DE CACHE (Para a página abrir instantaneamente na próxima vez)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
