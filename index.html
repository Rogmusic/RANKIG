<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamuelSports - Dashboard</title>
    <style>
        /* 1. Fundo e Reset */
        body {
            background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        h1 {
            font-weight: 900;
            margin: 30px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }

        /* 2. Layout Flexível (O Segredo para PC/Mobile) */
        .main-container {
            display: flex;
            flex-direction: row; /* Lado a lado no PC */
            flex-wrap: wrap;    /* Permite quebrar linha se não couber */
            justify-content: center;
            align-items: flex-start;
            gap: 25px;
            width: 95%;
            max-width: 1300px;
            margin-bottom: 50px;
        }

        /* 3. Estilo dos Containers dos Iframes */
                /* 3. Estilo dos Containers dos Iframes */
        .iframe-card {
            flex: 1;
            min-width: 380px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            
            /* AJUSTE AQUI: */
            height: 80vh; /* Ocupa 80% da altura da tela do PC */
            max-height: 850px; /* Limite máximo para não esticar demais em monitores gigantes */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* 4. Ajustes para Celular */
        @media (max-width: 850px) {
            .main-container {
                flex-direction: column; /* Um embaixo do outro no Mobile */
                align-items: center;
            }
            .iframe-card {
                width: 100%;
                min-width: unset;
                height: 750px; /* Reduz um pouco a altura no celular */
            }
            h1 { font-size: 1.5rem; }
        }


  .btn-voltar {
    padding: 10px 20px;
    background-color: #1a73e8;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: sans-serif;
  }
  .btn-voltar:hover {
    background-color: #1557b0;
  }


    </style>
</head>
<body>

    <h1>SAMUELSPORTS DASHBOARD</h1>

    <div class="main-container">
        <!-- Coluna 1: Ranking -->
        <div class="iframe-card">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzAobFXUiQYP1ls3DCNRSCUsPSW7OBuoB3MyYi38WW7bM8OBt6SORU8UtSSX2Kwg5Vw1Q/exec" 
                allowtransparency="true">
            </iframe>
        </div>

        <!-- Coluna 2: Venda de Ingressos -->
        <div class="iframe-card">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzPETHNtT0LHviERuJ7haEelErtcIQiret79w-qc7SjoFP0LaJxOXzg6-OLMHApgha-yg/exec" 
                allowtransparency="true">
            </iframe>
        </div>
    </div>
<button onclick="voltarParaLogin()" class="btn-voltar">Sair / Voltar ao Login</button>
<script>
  function voltarParaLogin() {
    // Substitua pelo link que o Google te deu na "Implantação" (Deploy)
    window.location.href = "https://google.com";
  }
</script>

</body>
</html>
