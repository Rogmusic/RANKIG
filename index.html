<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamuelSports - Dashboard</title>
    <style>
        /* 1. Fundo e Reset */
        body {
            background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        h1 {
            font-weight: 900;
            margin: 30px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }

        /* 2. Layout Flexível (O Segredo para PC/Mobile) */
        .main-container {
            display: flex;
            flex-direction: row; /* Lado a lado no PC */
            flex-wrap: wrap;    /* Permite quebrar linha se não couber */
            justify-content: center;
            align-items: flex-start;
            gap: 25px;
            width: 95%;
            max-width: 1300px;
            margin-bottom: 50px;
        }

        /* 3. Estilo dos Containers dos Iframes */
        .iframe-card {
            flex: 1;            /* Divide o espaço igualitariamente */
            min-width: 380px;   /* Não deixa ficar muito "tripa" */
            background: rgba(0, 0, 0, 0.3); /* Vidro fumê suave */
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            height: 900px;      /* Altura fixa para evitar scroll duplo chato */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* 4. Ajustes para Celular */
        @media (max-width: 850px) {
            .main-container {
                flex-direction: column; /* Um embaixo do outro no Mobile */
                align-items: center;
            }
            .iframe-card {
                width: 100%;
                min-width: unset;
                height: 750px; /* Reduz um pouco a altura no celular */
            }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <h1>SAMUELSPORTS DASHBOARD</h1>

    <div class="main-container">
        <!-- Coluna 1: Ranking -->
        <div class="iframe-card">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbwH9ARs0FhN3ErVp4ARj3BSuqCau7REpWG11aXv_-SyZP-t5mKZCSsCUv1IaMhf4px_Jw/exec" 
                allowtransparency="true">
            </iframe>
        </div>

        <!-- Coluna 2: Venda de Ingressos -->
        <div class="iframe-card">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzPETHNtT0LHviERuJ7haEelErtcIQiret79w-qc7SjoFP0LaJxOXzg6-OLMHApgha-yg/exec" 
                allowtransparency="true">
            </iframe>
        </div>
    </div>

</body>
</html>
