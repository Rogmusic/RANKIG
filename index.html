<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Leaderboard</title>
    <style>
        body {
            background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #e9e3e3;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .ranking-container {
            width: 95%;
            max-width: 600px;
            margin-top: 20px;
            /* Skeleton loader simples enquanto carrega */
            min-height: 400px; 
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: transparent;
            display: block;
        }
    </style>
</head>
<body>

    <h1>SAMUELSPORTS</h1>

    <div class="ranking-container" id="container-ranking">
        <!-- O iframe será injetado aqui via JS -->
    </div>

    <script>
        // Aguarda o carregamento completo do DOM
        window.addEventListener('DOMContentLoaded', (event) => {
            const container = document.getElementById('container-ranking');
            const iframe = document.createElement('iframe');
            
            // Configurações do iframe
            iframe.src = "https://script.google.com/macros/s/AKfycbzET26SuTUFltwRutjLbRT49ZhE4qFsyXwa_iLiWrPRsXaPk8Z1h1ioKSRRhI84MoB4ng/exec";
            iframe.setAttribute('allowtransparency', 'true');
            iframe.setAttribute('loading', 'lazy'); // Dica extra para o navegador
            
            // Adiciona ao container
            container.appendChild(iframe);
        });
    </script>

</body>
</html>
