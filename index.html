<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamuelSports - Dashboard</title>
    <style>
        body {
            background-image: url("view-empty-soccer-stadium-with-fantasy-dreamy-sky.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        h1 {
            color: #e9e3e3;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* CONTAINER DOS IFRAMES */
        .main-container {
            width: 95%;
            max-width: 1200px; /* Largura maior para caber dois lado a lado */
            display: flex;
            flex-wrap: wrap; /* Permite quebrar linha no mobile */
            justify-content: center;
            gap: 20px; /* Espaço entre os dois */
            margin-bottom: 30px;
        }

        .iframe-wrapper {
            flex: 1; /* Faz os dois dividirem o espaço igual no PC */
            min-width: 350px; /* Impede que fiquem finos demais */
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            overflow: hidden;
            min-height: 800px;
        }

        iframe {
            width: 100%;
            height: 850px;
            border: none;
            background: transparent;
        }

        /* AJUSTE PARA MOBILE */
        @media (max-width: 800px) {
            .iframe-wrapper {
                flex: 1 1 100%; /* No celular, cada um ocupa 100% da largura */
                min-height: 600px;
            }
            iframe { height: 700px; }
        }
    </style>
</head>
<body>

    <h1>SAMUELSPORTS</h1>

    <div class="main-container">
        <!-- Iframe 1: Ranking -->
        <div class="iframe-wrapper" id="container-ranking"></div>

        <!-- Iframe 2: Venda de Ingressos -->
        <div class="iframe-wrapper" id="container-vendas"></div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Links dos seus Apps Scripts
            
            const urlVendas = "https://script.google.com/macros/s/AKfycbwH9ARs0FhN3ErVp4ARj3BSuqCau7REpWG11aXv_-SyZP-t5mKZCSsCUv1IaMhf4px_Jw/exec";
            const urlRanking = "https://script.google.com/macros/s/AKfycbw2ak-evcfOBudSwcpBdEwiC4nZZmiXzS2BynG0JPG5HsrW8_rqziG1wnAjA0QdADfXRA/exec";
            // Injetar Iframe 1
            const frame1 = document.createElement('iframe');
            frame1.src = urlRanking;
            frame1.setAttribute('allowtransparency', 'true');
            document.getElementById('container-ranking').appendChild(frame1);

            // Injetar Iframe 2
            const frame2 = document.createElement('iframe');
            frame2.src = urlVendas;
            frame2.setAttribute('allowtransparency', 'true');
            document.getElementById('container-vendas').appendChild(frame2);
        });
    </script>

</body>
</html>
